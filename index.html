<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Weather Application</title>
  </head>

  <body class="min-h-screen bg-blue-500 flex justify-center items-center p-4">
    <div class="w-full max-w-md bg-black border rounded-3xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-white text-center mb-2">
        Weather App
      </h1>

      <p class="text-center text-white/90 mb-6">
        Enter a city and check the current weather
      </p>

      <form class="flex gap-2 mb-6">
        <input
          type="text"
          id="city"
          placeholder="Enter city name"
          class="flex-1 px-4 py-3 rounded-xl border-none outline-none bg-white text-gray-700 shadow-md"
        />

        <button
          type="button"
          onclick="fetchWeather()"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-3 rounded-xl shadow-lg transition duration-300 cursor-pointer"
        >
          Search
        </button>
      </form>

      <div
        id="display"
        class="bg-white/20 rounded-2xl p-5 text-white text-center min-h-24 flex items-center justify-center"
      >
        <p class="text-white/80">Weather information will appear here</p>
      </div>
    </div>
  </body>
</html>
